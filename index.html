<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoアプリ</title>

  <!-- PWA: マニフェスト -->
  <link rel="manifest" href="manifest.json">

  <!-- PWA: テーマカラー（ブラウザのUIバーの色） -->
  <meta name="theme-color" content="#0d3b52">

  <!-- PWA: iOSホーム画面追加サポート -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ToDoアプリ">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 16px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: #e0f7fa;
      border: none;
      border-radius: 24px;
      padding: 36px 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    .header {
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #0d3b52;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 0.85rem;
      color: #5a8fa3;
      margin-top: 4px;
    }

    /* --- 入力エリア --- */
    .input-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      background: #fff;
      border: 1.5px solid #b2dce8;
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #0d3b52;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input[type="text"]::placeholder {
      color: #a0c4d4;
    }

    .input-row input[type="text"]:focus {
      border-color: #0d3b52;
    }

    .input-row button {
      padding: 12px 20px;
      background: #0d3b52;
      color: #e0f7fa;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }

    .input-row button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    .input-row button:active {
      transform: translateY(0);
    }

    /* 期限入力行 */
    .deadline-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .deadline-row label {
      font-size: 0.82rem;
      color: #5a8fa3;
      white-space: nowrap;
    }

    .deadline-row input[type="date"] {
      flex: 1;
      padding: 8px 12px;
      background: #fff;
      border: 1.5px solid #b2dce8;
      border-radius: 10px;
      font-size: 0.88rem;
      font-family: inherit;
      color: #0d3b52;
      outline: none;
      transition: border-color 0.2s;
      cursor: pointer;
    }

    .deadline-row input[type="date"]:focus {
      border-color: #0d3b52;
    }

    .deadline-row .clear-date {
      background: none;
      border: none;
      color: #a0c4d4;
      font-size: 1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s;
      line-height: 1;
    }

    .deadline-row .clear-date:hover {
      color: #ff6b8a;
    }

    /* --- 統計 --- */
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat {
      font-size: 0.78rem;
      color: #5a8fa3;
    }

    .stat span {
      color: #0d3b52;
      font-weight: 500;
    }

    /* --- タスクリスト --- */
    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #todo-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: #fff;
      border: 1px solid #b2dce8;
      border-radius: 14px;
      transition: background 0.2s, transform 0.15s;
      animation: slideIn 0.2s ease;
    }

    /* 期限切れ */
    #todo-list li.overdue:not(.done) {
      border-color: #ffb3b3;
      background: #fff8f8;
    }

    /* 今日・明日が期限 */
    #todo-list li.due-soon:not(.done) {
      border-color: #ffd89b;
      background: #fffdf5;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #todo-list li:hover {
      background: #f0faff;
      transform: translateX(2px);
    }

    #todo-list li.done {
      background: #f5fbfd;
    }

    /* カスタムチェックボックス */
    .checkbox-wrap {
      position: relative;
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      margin-top: 2px;
    }

    .checkbox-wrap input[type="checkbox"] {
      opacity: 0;
      position: absolute;
      width: 100%;
      height: 100%;
      cursor: pointer;
      margin: 0;
    }

    .checkbox-wrap .box {
      width: 20px;
      height: 20px;
      border: 2px solid #b2dce8;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      pointer-events: none;
    }

    .checkbox-wrap input:checked ~ .box {
      background: #0d3b52;
      border-color: #0d3b52;
    }

    .checkbox-wrap .box::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid #e0f7fa;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .checkbox-wrap input:checked ~ .box::after {
      opacity: 1;
    }

    /* タスク本文エリア */
    .task-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .task-text {
      font-size: 0.93rem;
      color: #0d3b52;
      word-break: break-word;
      transition: color 0.2s;
    }

    li.done .task-text {
      text-decoration: line-through;
      color: #a0c4d4;
    }

    /* 期限バッジ */
    .deadline-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      width: fit-content;
    }

    .deadline-badge.normal {
      background: #e8f4f8;
      color: #5a8fa3;
    }

    .deadline-badge.due-soon {
      background: #fff3cd;
      color: #b07d00;
    }

    .deadline-badge.overdue {
      background: #ffe0e0;
      color: #c0392b;
    }

    .deadline-badge.done-badge {
      background: #f0f0f0;
      color: #bbb;
      text-decoration: none;
    }

    /* タスクテキスト：クリックで編集できることを示す */
    .task-text {
      cursor: pointer;
    }

    .task-text:hover {
      color: #0a2e40;
      text-decoration: underline dotted #a0c4d4;
    }

    li.done .task-text:hover {
      color: #a0c4d4;
      text-decoration: none;
      cursor: default;
    }

    /* --- 編集フォーム --- */
    .edit-form {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .edit-form input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      background: #fff;
      border: 1.5px solid #0d3b52;
      border-radius: 10px;
      font-size: 0.93rem;
      font-family: inherit;
      color: #0d3b52;
      outline: none;
    }

    .edit-deadline-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .edit-deadline-row label {
      font-size: 0.78rem;
      color: #5a8fa3;
      white-space: nowrap;
    }

    .edit-deadline-row input[type="date"] {
      flex: 1;
      padding: 6px 10px;
      background: #fff;
      border: 1.5px solid #b2dce8;
      border-radius: 8px;
      font-size: 0.82rem;
      font-family: inherit;
      color: #0d3b52;
      outline: none;
      cursor: pointer;
    }

    .edit-deadline-row input[type="date"]:focus {
      border-color: #0d3b52;
    }

    .edit-actions {
      display: flex;
      gap: 6px;
    }

    .save-btn {
      padding: 6px 14px;
      background: #0d3b52;
      color: #e0f7fa;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .save-btn:hover {
      background: #16213e;
    }

    .cancel-btn {
      padding: 6px 12px;
      background: none;
      color: #5a8fa3;
      border: 1.5px solid #b2dce8;
      border-radius: 8px;
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .cancel-btn:hover {
      color: #0d3b52;
      border-color: #0d3b52;
    }

    /* 編集中のタスク行 */
    #todo-list li.editing {
      background: #f0faff;
      border-color: #0d3b52;
      transform: none !important;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #b2dce8;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
      line-height: 1;
      margin-top: 1px;
    }

    .delete-btn:hover {
      color: #ff6b8a;
      background: rgba(255,107,138,0.12);
    }

    .empty {
      text-align: center;
      color: #a0c4d4;
      font-size: 0.88rem;
      padding: 28px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>My ToDo</h1>
      <p>今日やることを整理しよう</p>
    </div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="task-input" placeholder="新しいタスクを追加..." maxlength="200">
        <button onclick="addTask()">追加</button>
      </div>
      <div class="deadline-row">
        <label for="date-input">期限</label>
        <input type="date" id="date-input">
        <button class="clear-date" onclick="clearDate()" title="期限をクリア">&#10005;</button>
      </div>
    </div>

    <div class="stats" id="stats"></div>
    <ul id="todo-list"></ul>
  </div>

  <script>
    const input     = document.getElementById('task-input');
    const dateInput = document.getElementById('date-input');
    const list      = document.getElementById('stats');
    const statsEl   = document.getElementById('stats');
    const todoList  = document.getElementById('todo-list');

    // 現在編集中のタスクの元インデックス（null = 編集中なし）
    let currentEditIndex = null;

    function today() {
      return new Date().toISOString().slice(0, 10); // "YYYY-MM-DD"
    }

    function tomorrow() {
      const d = new Date();
      d.setDate(d.getDate() + 1);
      return d.toISOString().slice(0, 10);
    }

    function deadlineStatus(dateStr) {
      if (!dateStr) return null;
      if (dateStr < today())     return 'overdue';
      if (dateStr <= tomorrow()) return 'due-soon';
      return 'normal';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-');
      const t = today();
      if (dateStr === t)         return '今日まで';
      if (dateStr === tomorrow()) return '明日まで';
      if (dateStr < t)           return `${m}/${d} 期限切れ`;
      return `${m}/${d} まで`;
    }

    function loadTasks() {
      return JSON.parse(localStorage.getItem('tasks') || '[]');
    }

    function saveTasks(tasks) {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function renderStats(tasks) {
      const done  = tasks.filter(t => t.done).length;
      const total = tasks.length;
      statsEl.innerHTML = total === 0 ? '' :
        `<span class="stat">合計 <span>${total}</span></span>
         <span class="stat">完了 <span>${done}</span></span>
         <span class="stat">残り <span>${total - done}</span></span>`;
    }

    // タスクを「未完了・期限近い順 → 未完了・期限なし → 完了」の順に並べる
    function sortTasks(tasks) {
      // 各タスクに元のインデックスを添付してから並び替え
      return tasks
        .map((task, i) => ({ task, i }))
        .sort((a, b) => {
          // 完了は未完了の後ろへ
          if (a.task.done !== b.task.done) return a.task.done ? 1 : -1;

          const da = a.task.deadline;
          const db = b.task.deadline;

          // 両方期限なし → 順不同
          if (!da && !db) return 0;
          // 片方だけ期限なし → 期限ありを前へ
          if (!da) return 1;
          if (!db) return -1;
          // 両方期限あり → 日付が近い方を前へ
          return da < db ? -1 : da > db ? 1 : 0;
        });
    }

    function render() {
      const tasks = loadTasks();
      todoList.innerHTML = '';
      renderStats(tasks);

      if (tasks.length === 0) {
        todoList.innerHTML = '<p class="empty">タスクがありません</p>';
        return;
      }

      sortTasks(tasks).forEach(({ task, i }) => {
        const status = deadlineStatus(task.deadline);
        const li = document.createElement('li');
        const isEditing = (i === currentEditIndex);

        if (isEditing) {
          li.classList.add('editing');
        } else {
          if (task.done) li.classList.add('done');
          else if (status === 'overdue')  li.classList.add('overdue');
          else if (status === 'due-soon') li.classList.add('due-soon');
        }

        // チェックボックス（編集中は操作不可にしない）
        const wrap = document.createElement('label');
        wrap.className = 'checkbox-wrap';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = task.done;
        cb.addEventListener('change', () => toggleTask(i));
        const box = document.createElement('span');
        box.className = 'box';
        wrap.append(cb, box);

        if (isEditing) {
          // ===== 編集モード =====
          const form = document.createElement('div');
          form.className = 'edit-form';

          const editText = document.createElement('input');
          editText.type = 'text';
          editText.value = task.text;
          editText.maxLength = 200;

          const deadlineRow = document.createElement('div');
          deadlineRow.className = 'edit-deadline-row';
          const dlLabel = document.createElement('label');
          dlLabel.textContent = '期限';
          const editDate = document.createElement('input');
          editDate.type = 'date';
          editDate.value = task.deadline || '';
          deadlineRow.append(dlLabel, editDate);

          const actions = document.createElement('div');
          actions.className = 'edit-actions';
          const saveBtn = document.createElement('button');
          saveBtn.className = 'save-btn';
          saveBtn.textContent = '保存';
          const cancelBtn = document.createElement('button');
          cancelBtn.className = 'cancel-btn';
          cancelBtn.textContent = 'キャンセル';
          actions.append(saveBtn, cancelBtn);

          form.append(editText, deadlineRow, actions);

          // 保存処理
          const doSave = () => {
            const newText = editText.value.trim();
            if (!newText) return;
            saveEdit(i, newText, editDate.value || null);
          };
          saveBtn.addEventListener('click', doSave);
          editText.addEventListener('keydown', e => {
            if (e.key === 'Enter') doSave();
            if (e.key === 'Escape') cancelEdit();
          });
          editDate.addEventListener('keydown', e => {
            if (e.key === 'Escape') cancelEdit();
          });
          cancelBtn.addEventListener('click', cancelEdit);

          li.append(wrap, form);
          // 描画後にテキスト入力へフォーカス
          requestAnimationFrame(() => editText.focus());

        } else {
          // ===== 通常モード =====
          const body = document.createElement('div');
          body.className = 'task-body';

          const span = document.createElement('span');
          span.className = 'task-text';
          span.textContent = task.text;
          span.title = 'クリックして編集';
          // 完了済みは編集不可
          if (!task.done) {
            span.addEventListener('click', () => startEdit(i));
          }
          body.appendChild(span);

          if (task.deadline) {
            const badge = document.createElement('span');
            badge.className = 'deadline-badge ' + (task.done ? 'done-badge' : (status || 'normal'));
            badge.textContent = formatDate(task.deadline);
            body.appendChild(badge);
          }

          const btn = document.createElement('button');
          btn.className = 'delete-btn';
          btn.innerHTML = '&#10005;';
          btn.title = '削除';
          btn.addEventListener('click', () => deleteTask(i));

          li.append(wrap, body, btn);
        }

        todoList.appendChild(li);
      });
    }

    function addTask() {
      const text = input.value.trim();
      if (!text) return;

      const tasks = loadTasks();
      tasks.push({ text, done: false, deadline: dateInput.value || null });
      saveTasks(tasks);
      input.value = '';
      dateInput.value = '';
      render();
    }

    function clearDate() {
      dateInput.value = '';
    }

    function startEdit(index) {
      currentEditIndex = index;
      render();
    }

    function saveEdit(index, newText, newDeadline) {
      const tasks = loadTasks();
      tasks[index].text     = newText;
      tasks[index].deadline = newDeadline;
      saveTasks(tasks);
      currentEditIndex = null;
      render();
    }

    function cancelEdit() {
      currentEditIndex = null;
      render();
    }

    function deleteTask(index) {
      const tasks = loadTasks();
      tasks.splice(index, 1);
      saveTasks(tasks);
      render();
    }

    function toggleTask(index) {
      const tasks = loadTasks();
      tasks[index].done = !tasks[index].done;
      saveTasks(tasks);
      render();
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();

    // PWA: Service Worker を登録してオフライン対応を有効化
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
