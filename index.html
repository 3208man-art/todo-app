<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 16px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 36px 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.25);
    }

    .header {
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #fff;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .input-row input::placeholder {
      color: rgba(255,255,255,0.4);
    }

    .input-row input:focus {
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.18);
    }

    .input-row button {
      padding: 12px 20px;
      background: #fff;
      color: #11998e;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }

    .input-row button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    .input-row button:active {
      transform: translateY(0);
    }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
    }

    .stat span {
      color: rgba(255,255,255,0.9);
      font-weight: 500;
    }

    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #todo-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      transition: background 0.2s, transform 0.15s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #todo-list li:hover {
      background: rgba(255,255,255,0.16);
      transform: translateX(2px);
    }

    #todo-list li.done {
      background: rgba(255,255,255,0.05);
    }

    /* カスタムチェックボックス */
    .checkbox-wrap {
      position: relative;
      flex-shrink: 0;
      width: 20px;
      height: 20px;
    }

    .checkbox-wrap input[type="checkbox"] {
      opacity: 0;
      position: absolute;
      width: 100%;
      height: 100%;
      cursor: pointer;
      margin: 0;
    }

    .checkbox-wrap .box {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      pointer-events: none;
    }

    .checkbox-wrap input:checked ~ .box {
      background: #fff;
      border-color: #fff;
    }

    .checkbox-wrap .box::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid #764ba2;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .checkbox-wrap input:checked ~ .box::after {
      opacity: 1;
    }

    .task-text {
      flex: 1;
      font-size: 0.93rem;
      color: rgba(255,255,255,0.9);
      word-break: break-word;
      transition: color 0.2s;
    }

    li.done .task-text {
      text-decoration: line-through;
      color: rgba(255,255,255,0.35);
    }

    .delete-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.25);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
      line-height: 1;
    }

    .delete-btn:hover {
      color: #ff6b8a;
      background: rgba(255,107,138,0.12);
    }

    .empty {
      text-align: center;
      color: rgba(255,255,255,0.35);
      font-size: 0.88rem;
      padding: 28px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>My ToDo</h1>
      <p>今日やることを整理しよう</p>
    </div>
    <div class="input-row">
      <input type="text" id="task-input" placeholder="新しいタスクを追加..." maxlength="200">
      <button onclick="addTask()">追加</button>
    </div>
    <div class="stats" id="stats"></div>
    <ul id="todo-list"></ul>
  </div>

  <script>
    const input = document.getElementById('task-input');
    const list  = document.getElementById('todo-list');
    const stats = document.getElementById('stats');

    function loadTasks() {
      return JSON.parse(localStorage.getItem('tasks') || '[]');
    }

    function saveTasks(tasks) {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function renderStats(tasks) {
      const done  = tasks.filter(t => t.done).length;
      const total = tasks.length;
      stats.innerHTML = total === 0 ? '' :
        `<span class="stat">合計 <span>${total}</span></span>
         <span class="stat">完了 <span>${done}</span></span>
         <span class="stat">残り <span>${total - done}</span></span>`;
    }

    function render() {
      const tasks = loadTasks();
      list.innerHTML = '';
      renderStats(tasks);

      if (tasks.length === 0) {
        list.innerHTML = '<p class="empty">タスクがありません</p>';
        return;
      }

      tasks.forEach((task, i) => {
        const li = document.createElement('li');
        if (task.done) li.classList.add('done');

        const wrap = document.createElement('label');
        wrap.className = 'checkbox-wrap';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = task.done;
        cb.addEventListener('change', () => toggleTask(i));

        const box = document.createElement('span');
        box.className = 'box';

        wrap.append(cb, box);

        const span = document.createElement('span');
        span.className = 'task-text';
        span.textContent = task.text;

        const btn = document.createElement('button');
        btn.className = 'delete-btn';
        btn.innerHTML = '&#10005;';
        btn.title = '削除';
        btn.addEventListener('click', () => deleteTask(i));

        li.append(wrap, span, btn);
        list.appendChild(li);
      });
    }

    function addTask() {
      const text = input.value.trim();
      if (!text) return;

      const tasks = loadTasks();
      tasks.push({ text, done: false });
      saveTasks(tasks);
      input.value = '';
      render();
    }

    function deleteTask(index) {
      const tasks = loadTasks();
      tasks.splice(index, 1);
      saveTasks(tasks);
      render();
    }

    function toggleTask(index) {
      const tasks = loadTasks();
      tasks[index].done = !tasks[index].done;
      saveTasks(tasks);
      render();
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
